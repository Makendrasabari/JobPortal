<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Match not found. The page you are looking for does not exist on Stackly.">
  <title>404 - Match Not Found &bull; Stackly</title>
  
  <!-- CSS Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages.css">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="assets/logo-favicon.webp">
  
  <style>
    /* Premium 404 specific styling */
    .error-sec {
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%) !important;
      color: var(--white) !important;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    
    /* Background grid effect */
    .error-sec::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center;
      z-index: 1;
      pointer-events: none;
    }
    
    .error-card {
      max-width: 440px;
      width: 90%;
      padding: 3rem 2rem;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-xl);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      text-align: center;
      position: relative;
      z-index: 2;
    }
    
    .matching-fail-viz {
      position: relative;
      height: 80px;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .node-user {
      width: 16px;
      height: 16px;
      background: #4486f2; /* Updated theme color */
      border-radius: 50%;
      box-shadow: 0 0 20px #4486f2;
      z-index: 3;
      animation: pulseUser 2s infinite;
    }
    
    .connector-line {
      width: 120px;
      height: 2px;
      z-index: 2;
      animation: connectionBreak 4s infinite ease-in-out;
    }
    
    .node-target {
      width: 16px;
      height: 16px;
      background: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 20px #ef4444;
      z-index: 3;
      animation: pulseTarget 2s infinite;
      position: absolute;
      right: calc(50% - 68px);
    }
    
    .node-left {
      position: absolute;
      left: calc(50% - 68px);
    }
    
    @keyframes pulseUser {
      0%, 100% { transform: scale(1); box-shadow: 0 0 10px #4486f2; }
      50% { transform: scale(1.2); box-shadow: 0 0 25px #4486f2; }
    }
    
    @keyframes pulseTarget {
      0%, 100% { transform: scale(1); box-shadow: 0 0 10px #ef4444; opacity: 0.6; }
      50% { transform: scale(1.2); box-shadow: 0 0 25px #ef4444; opacity: 1; }
    }
    
    @keyframes connectionBreak {
      0% {
        width: 120px;
        opacity: 1;
        background: repeating-linear-gradient(90deg, #4486f2, #4486f2 4px, transparent 4px, transparent 8px);
      }
      35% {
        width: 120px;
        opacity: 1;
        background: repeating-linear-gradient(90deg, #4486f2, #4486f2 4px, transparent 4px, transparent 8px);
      }
      45% {
        width: 120px;
        opacity: 0.8;
        background: repeating-linear-gradient(90deg, #ef4444, #ef4444 4px, transparent 4px, transparent 8px);
      }
      55% {
        width: 0px;
        opacity: 0;
      }
      70% {
        width: 0px;
        opacity: 0;
      }
      100% {
        width: 120px;
        opacity: 1;
        background: repeating-linear-gradient(90deg, #4486f2, #4486f2 4px, transparent 4px, transparent 8px);
      }
    }

    .error-code {
      font-size: 5.5rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #4486f2 0%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
      animation: errorFadeIn 0.8s ease;
    }
    
    .error-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white) !important;
      margin-bottom: 0.5rem;
      animation: errorFadeIn 0.8s ease 0.1s both;
    }
    
    .error-card p {
      font-size: 0.9rem;
      color: #94a3b8 !important;
      margin-bottom: 1.75rem;
      line-height: 1.5;
      animation: errorFadeIn 0.8s ease 0.2s both;
    }
    
    .error-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      animation: errorFadeIn 0.8s ease 0.3s both;
    }

    .error-actions .btn {
      padding: 0.65rem 1.25rem;
      font-size: 0.85rem;
      border-radius: var(--radius-md);
    }
  </style>
</head>
<body>

  <main class="error-sec">
    <div class="error-card">
      <div class="matching-fail-viz">
        <div class="node-user node-left"></div>
        <div class="connector-line"></div>
        <div class="node-target"></div>
      </div>
      
      <div class="error-code">404</div>
      <h1>Match Not Found</h1>
      <p>We couldn't connect you to this page. The resource may have been relocated or matches are unavailable.</p>
      
      <div class="error-actions">
        <a href="index.html" class="btn btn-outline" style="border-color: rgba(255,255,255,0.2); color: var(--white);"><i class="fas fa-home"></i> Home</a>
        <button onclick="goToDashboard()" class="btn btn-primary" id="btn-404-dashboard" style="background: #4486f2; color: white;"><i class="fas fa-chart-line"></i> Dashboard</button>
      </div>
    </div>
  </main>

  <!-- JS Scripts -->
  <script src="js/auth.js"></script>
  <script>
    function goToDashboard() {
      const session = getActiveSession();
      if (session) {
        if (session.role === 'job_seeker') {
          window.location.href = 'job-seeker-dashboard.html';
        } else if (session.role === 'recruiter') {
          window.location.href = 'recruiter-dashboard.html';
        }
      } else {
        window.location.href = 'login.html';
      }
    }
  </script>
</body>
</html>
